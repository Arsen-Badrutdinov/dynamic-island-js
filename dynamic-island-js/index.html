<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Island.js Demo</title>
    <link rel="stylesheet" href="dynamic-island.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            background: #1c1c1e;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
        }
        button:hover {
            background: #2c2c2e;
        }
        .container {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Island.js</h1>
        <p>Нажми на кнопки, чтобы протестировать.</p>
        <button onclick="island.show('Новое сообщение от Snek', 'info', 4000)">Показать уведомление (Info)</button>
        <button onclick="island.show('Скрипт успешно собран', 'success', 3000)">Показать успех (Success)</button>
        <button onclick="island.show('Ошибка подключения', 'error', 3000)">Показать ошибку (Error)</button>
    </div>

    <script src="dynamic-island.js"></script>
    <script>
        // Инициализация
        const island = new DynamicIsland();
    </script>
</body>
</html>
